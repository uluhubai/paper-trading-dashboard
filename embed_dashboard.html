<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Trading Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0e1117;
            color: #fafafa;
            height: 100vh;
            overflow: hidden;
        }
        
        .dashboard-container {
            width: 100%;
            height: 100vh;
            border: none;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00ff88;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #721c24;
            color: #f8d7da;
            padding: 20px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
        }
        
        .fallback-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #00ff88;
            color: #0e1117;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading Paper Trading Dashboard...</p>
    </div>
    
    <div id="error" class="error" style="display: none;">
        <h3>⚠️ Unable to load dashboard</h3>
        <p>The dashboard cannot be loaded in an iframe due to browser security restrictions.</p>
        <a href="http://100.92.200.109:8502" target="_blank" class="fallback-link">Open Dashboard in New Tab</a>
    </div>
    
    <iframe 
        id="dashboardFrame"
        src="http://100.92.200.109:8502" 
        class="dashboard-container"
        title="Paper Trading Dashboard"
        onload="document.getElementById('loading').style.display='none';"
        onerror="showError()"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
        referrerpolicy="no-referrer-when-downgrade">
    </iframe>
    
    <script>
        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('dashboardFrame').style.display = 'none';
            
            // Try alternative approach
            setTimeout(() => {
                // Create a new iframe with different attributes
                const newIframe = document.createElement('iframe');
                newIframe.src = 'http://100.92.200.109:8502';
                newIframe.className = 'dashboard-container';
                newIframe.title = 'Paper Trading Dashboard';
                newIframe.sandbox = 'allow-same-origin allow-scripts allow-popups allow-forms';
                
                document.body.appendChild(newIframe);
                document.getElementById('error').style.display = 'none';
            }, 3000);
        }
        
        // Check if we're in an iframe
        if (window.self !== window.top) {
            console.log('Dashboard loaded in iframe');
        }
        
        // Fallback: if not loaded in 10 seconds, show error
        setTimeout(() => {
            if (document.getElementById('loading').style.display !== 'none') {
                showError();
            }
        }, 10000);
    </script>
</body>
</html>
